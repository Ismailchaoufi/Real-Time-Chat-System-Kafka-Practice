server:
  port: 8221

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

jwt:
  secret: ${JWT_SECRET:mySecretKeyThatIsAtLeast32CharactersLong!}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.chat.gateway: DEBUG